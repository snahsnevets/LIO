<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WHS Score Calculator</title>

    <!-- iOS app settings -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="WHS calculator" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Favicon for browser tabs -->
    <link
      rel="icon"
      type="image/png"
      href="images/favicon-32.png"
      sizes="32x32"
    />
    <link
      rel="icon"
      type="image/png"
      href="images/favicon-64.png"
      sizes="64x64"
    />

    <!-- Apple Touch Icon for iOS home screen -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon-180.png" />

    <!-- Web App Manifest for PWA support -->
    <link rel="manifest" href="manifest.json" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#1a472a" />

    <!-- Main styles -->
    <link rel="stylesheet" href="styles.css?v=1.3" />
  </head>

  <body>
    <!-- Navigation Menu -->
    <nav class="navbar">
      <div class="nav-container">
        <button
          type="button"
          class="menu-toggle"
          id="menuToggle"
          title="Toggle navigation menu"
        >
          <span class="hamburger"></span>
        </button>
        <ul class="nav-menu" id="navMenu">
          <li class="nav-item">
            <a href="index.html" class="nav-link">Home</a>
          </li>
          <li class="nav-item">
            <a href="WHS.html" class="nav-link active">Handicap</a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="whs-container">
      <h2>Hoeveel slagen krijg je?</h2>

      <label for="baan">Kies baan:</label>
      <select id="baan" onchange="selectCourse()">
        <option value="" selected disabled>-- Kies een baan --</option>
        <option value="haagsche">Haagsche Golf en Country Club</option>
        <option value="leeuwenbergh">Leeuwenbergh</option>
        <option value="scherpenbergh">De Scherpenbergh</option>
        <option value="weleveld">Weleveld Golf</option>
        <option value="ommen">Hooge Graven GC Ommen</option>
        <option value="driene">Golfclub Driene</option>
        <option value="sallandse">Sallandsche Golfclub De Hoek</option>
      </select>

      <div id="gender-section">
        <label>Geslacht:</label>
        <div id="gender-buttons" class="btn-group">
          <div class="btn male" onclick="selectGender('male')">Male</div>
          <div class="btn female" onclick="selectGender('female')">Female</div>
        </div>
      </div>

      <div id="hcp-section">
        <div class="hcp-row">
          <label for="hcp">Handicap:</label>
          <input
            type="number"
            id="hcp"
            step="0.1"
            min="-10"
            max="54"
            placeholder="8.2"
          />
          <span><label id="hcp">Slagen:</label></span>
          <input type="text" id="slagen-resultaat" readonly />
        </div>
      </div>

      <div id="tee-section">
        <label>Tee-box:</label>
        <div id="tee-buttons" class="btn-group"></div>
      </div>

      <div class="score-row">
        <label for="score">Score:</label>
        <input type="number" id="score" min="1" placeholder="Bijv. 83" />
      </div>

      <!--  
      <button class="calc" onclick="berekenWHS()">Bereken de WHS-score</button>
      -->

      <div id="resultaat"></div>
    </div>

    <!-- Menu Toggle Script and WHS Calculator Script -->
    <script src="scripts.js"></script>
    <script src="whs-calculator.js"></script>
  </body>
</html>
