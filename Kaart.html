<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <title>Limburg Open - Kaart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      #map {
        height: 80vh;
        width: 100%;
      }
      /* Styling voor de jaarkiezer */
      .filter-wrapper {
        margin: 15px 0;
        font-family: Arial, sans-serif;
      }
      .filter-wrapper label {
        font-weight: bold;
        margin-right: 10px;
        color: #333;
      }
      .filter-wrapper select {
        padding: 6px 12px;
        font-size: 15px;
        border-radius: 4px;
        border: 1px solid #ccc;
        background-color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="historyPanel" class="history-panel">
        <div class="history-content">
          <button class="close-btn" onclick="closeHistory()">✕</button>
          <h2>⛳ Limburg Open - Golfbanen</h2>

          <div class="filter-wrapper">
            <label for="jaarSelect">Selecteer een jaar:</label>
            <select id="jaarSelect" onchange="updateKaart()">
              <option value="alle">Toon alle banen</option>
              <option value="2014">2014</option>
              <option value="2015">2015</option>
              <option value="2016">2016</option>
              <option value="2017">2017</option>
              <option value="2018">2018</option>
              <option value="2019">2019</option>
              <option value="2020">2020</option>
              <option value="2021">2021</option>
              <option value="2022">2022</option>
              <option value="2023">2023</option>
              <option value="2024">2024</option>
              <option value="2025">2025</option>
              <option value="2026">2026</option>
            </select>
          </div>

          <div id="map"></div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        },
      ).addTo(map);

      // De volledige dataset met alle 48 banen

      // Een groep aanmaken om alle markers in op te vangen
      var markerGroup = L.featureGroup().addTo(map);

      // De update-functie die reageert op de dropdown
      function updateKaart() {
        // Wis alle huidige markers op de kaart
        markerGroup.clearLayers();

        // Haal het gekozen jaar op uit de selectie
        var gekozenJaar = document.getElementById("jaarSelect").value;

        // Loop door alle banen
        banen.forEach(function (baan) {
          var baanNaam = baan[0];
          var lat = baan[1];
          var lng = baan[2];

          // Controleer of het gekozen jaar in de naamtekst voorkomt (bijv. "(2020)")
          // of dat de optie 'alle' is geselecteerd
          if (gekozenJaar === "alle" || baanNaam.includes(gekozenJaar)) {
            var marker = L.marker([lat, lng]).bindPopup(
              "<b>" + baanNaam + "</b>",
            );
            markerGroup.addLayer(marker);
          }
        });

        // Alleen zoomen als er daadwerkelijk markers op de kaart staan
        if (markerGroup.getLayers().length > 0) {
          map.fitBounds(markerGroup.getBounds().pad(0.1));
        }
      }

      // Start de kaart de eerste keer op met álle banen in beeld
      updateKaart();
    </script>

    <script>
      function closeHistory() {
        window.location.href = "index.html";
      }
    </script>
  </body>
</html>
