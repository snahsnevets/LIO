        iconUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png",
        shadowUrl:
          "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41],
        className: "red-marker", // Maakt de marker rood via de CSS filter hierboven
      });

      function updateKaart() {
        markerGroup.clearLayers();
        var gekozenJaar = document.getElementById("jaarSelect").value;

        // A. PLAATS HET HUISJE VAN DAT JAAR (INDIEN BESCHIKBAAR)
        huisjes.forEach(function (huisje) {
          if (gekozenJaar === "alle" || huisje.jaar === gekozenJaar) {
            var marker = L.marker([huisje.lat, huisje.lng], {
              icon: redIcon,
            }).bindPopup(`<b>${huisje.naam}</b>`);
            markerGroup.addLayer(marker);
          }
        });

        // B. PLAATS DE GOLFBANEN VAN DAT JAAR
        banen.forEach(function (baan) {
          var baanNaam = baan[0];
          var lat = baan[1];
          var lng = baan[2];

          if (gekozenJaar === "alle" || baanNaam.includes(gekozenJaar)) {
            var marker = L.marker([lat, lng]).bindPopup(
              "<b>" + baanNaam + "</b>",
            );
            markerGroup.addLayer(marker);
          }
        });

        if (markerGroup.getLayers().length > 0) {
          map.fitBounds(markerGroup.getBounds().pad(0.1));
        }
      }

      updateKaart();
